<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FAF7F2" />
  <title>Trip — 나의 여행 기록</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Leaflet CSS & MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- JS가 렌더링합니다 -->
    <div class="loading-screen">
      <div class="loading-logo">Trip</div>
      <div class="loading-spinner"></div>
    </div>
  </div>

  <!-- Global Map Overlay -->
  <div id="globalMapModal" class="global-modal hidden">
    <div class="global-modal-header">
      <h2>🗺️ 내가 다녀온 곳들</h2>
      <button class="btn-close-modal" id="btn-close-global-map">✕</button>
    </div>
    <div id="globalMapContainer" class="global-map-container"></div>
  </div>

  <!-- Global Gallery Overlay -->
  <div id="globalGalleryModal" class="global-modal hidden">
    <div class="global-modal-header">
      <h2>😋 음식 사진 모아보기</h2>
      <button class="btn-close-modal" id="btn-close-global-gallery">✕</button>
    </div>
    <div id="globalGalleryContainer" class="global-gallery-container masonry-grid"></div>
  </div>

  <!-- 이미지 압축 라이브러리 (EXIF 보존 지원) -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
  <!-- Leaflet JS & MarkerCluster -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
</html>
